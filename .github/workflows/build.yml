name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:   # también se puede disparar a mano desde GitHub

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt pyinstaller

      - name: Construir ejecutable
        run: pyinstaller appPlanillas.spec --distpath dist/windows

      - name: Construir instalador (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Subir instalador
        uses: actions/upload-artifact@v4
        with:
          name: appPlanillas-windows-setup
          path: dist/installer/appPlanillas-setup.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y libgtk-3-dev libglib2.0-dev

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt pyinstaller

      - name: Construir ejecutable
        run: pyinstaller appPlanillas.spec --distpath dist/linux

      - name: Subir ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: appPlanillas-linux
          path: dist/linux/appPlanillas
